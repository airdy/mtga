<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch VOD Stream Player</title>
    <style>
        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0e0e10; color: #efeff1; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .container { width: 100%; max-width: 1000px; }
        .search-container { display: flex; gap: 10px; margin-bottom: 25px; }
        input {
            flex: 1; padding: 14px; border-radius: 6px; border: 2px solid #26262c;
            background-color: #1f1f23; color: #fff; font-size: 1rem;
        }
        input:focus { outline: none; border-color: #9146ff; }
        button {
            padding: 14px 28px; border-radius: 6px; border: none; background-color: #9146ff;
            color: white; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.2s;
        }
        button:hover { background-color: #772ce8; }
        
        .player-box { width: 100%; margin-bottom: 30px; background: #18181b; border-radius: 8px; padding: 12px; box-sizing: border-box; }
        video { width: 100%; aspect-ratio: 16/9; border-radius: 6px; background-color: #000; }
        .video-title { margin-top: 12px; font-size: 1.1rem; font-weight: 600; color: #adadb8; }

        .vod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .vod-card {
            background: #1f1f23; border-radius: 8px; overflow: hidden; cursor: pointer;
            border: 2px solid transparent; transition: transform 0.2s, border-color 0.2s;
        }
        .vod-card:hover { border-color: #9146ff; transform: translateY(-3px); }
        .vod-preview { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background-color: #26262c; }
        .vod-details { padding: 12px; }
        .vod-name {
            font-weight: bold; font-size: 0.95rem; line-height: 1.4; color: #fff;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px;
        }
        .vod-meta { font-size: 0.8rem; color: #adadb8; }
        .status-msg { text-align: center; color: #9146ff; font-weight: bold; margin: 20px; display: none; }
        
        .load-more-container { display: flex; justify-content: center; margin-top: 30px; margin-bottom: 50px; }
        .load-more-btn { background-color: #26262c; color: #efeff1; border: 2px solid #3a3a44; display: none; }
        .load-more-btn:hover { background-color: #3a3a44; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<div class="container">
    <h2>Пошук прихованих VOD стрімів</h2>
    
    <div class="search-container">
        <input type="text" id="streamerName" placeholder="Введіть точний нікнейм стрімера...">
        <button onclick="startNewSearch()">Знайти трансляції</button>
    </div>

    <div class="player-box">
        <video id="mainPlayer" controls playsinline webkit-playsinline></video>
        <div class="video-title" id="nowPlaying">Плеєр очікує вибору відео</div>
    </div>

    <div class="status-msg" id="statusMessage">Завантаження записів...</div>
    <div class="vod-grid" id="vodGrid"></div>

    <div class="load-more-container">
        <button id="loadMoreBtn" class="load-more-btn" onclick="fetchStreamerVods()">Завантажити ще відео</button>
    </div>
</div>

<script>
    const player = document.getElementById('mainPlayer');
    const nowPlayingText = document.getElementById('nowPlaying');
    const grid = document.getElementById('vodGrid');
    const statusMsg = document.getElementById('statusMessage');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    
    let hlsPlayer = null;
    let currentUsername = "";
    let nextCursor = null;

    function startNewSearch() {
        const username = document.getElementById('streamerName').value.trim();
        if (!username) return alert('Нікнейм не може бути порожнім!');
        
        currentUsername = username;
        nextCursor = null; // Скидаємо сторінку для нового пошуку
        grid.innerHTML = '';
        loadMoreBtn.style.display = 'none';
        
        fetchStreamerVods();
    }

    async function fetchStreamerVods() {
        statusMsg.style.display = 'block';
        statusMsg.innerText = nextCursor ? 'Завантаження наступної сторінки...' : 'Звернення до серверів...';
        loadMoreBtn.style.display = 'none';

        try {
            let url = `/api/get-vods?username=${encodeURIComponent(currentUsername)}`;
            if (nextCursor) {
                url += `&cursor=${encodeURIComponent(nextCursor)}`;
            }

            const res = await fetch(url);
            const data = await res.json();
            statusMsg.style.display = 'none';

            if (data.error) {
                alert('Помилка: ' + data.error);
                return;
            }

            if (!data.vods || data.vods.length === 0) {
                if (!nextCursor) {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">Трансляцій не знайдено.</p>';
                } else {
                    alert('Ви завантажили всі доступні відео.');
                }
                return;
            }

            displayVods(data.vods);
            
            // Зберігаємо маркер наступної сторінки
            nextCursor = data.nextCursor || null;
            
            // Якщо є куди гортати далі — показуємо кнопку
            if (nextCursor) {
                loadMoreBtn.style.display = 'block';
            } else {
                loadMoreBtn.style.display = 'none';
            }

        } catch (err) {
            statusMsg.style.display = 'none';
            alert('Помилка звʼязку: ' + err.message);
        }
    }

    function displayVods(vods) {
        vods.forEach(vod => {
            const card = document.createElement('div');
            card.className = 'vod-card';
            
            const dateStr = new Date(vod.created_at).toLocaleDateString('uk-UA', {
                day: 'numeric', month: 'long', year: 'numeric'
            });

            card.innerHTML = `
                <img class="vod-preview" src="${vod.thumbnail}" alt="Прев'ю стріму">
                <div class="vod-details">
                    <div class="vod-name">${vod.title || 'Трансляція без назви'}</div>
                    <div class="vod-meta">🕒 ${vod.duration} | 📅 ${dateStr}</div>
                </div>
            `;

            card.onclick = () => launchVideo(vod.m3u8, vod.title);
            grid.appendChild(card); // Важливо:appendChild додає нові картки до старих, а не затирає їх
        });
    }

    function launchVideo(m3u8Url, title) {
        if (!m3u8Url) return alert('Немає посилання на потік.');

        nowPlayingText.innerText = "⏳ Завантаження потоку: " + title;

        if (player.canPlayType('application/vnd.apple.mpegurl')) {
            player.src = m3u8Url;
            player.play()
                .then(() => { nowPlayingText.innerText = "Зараз відтворюється: " + title; })
                .catch(err => {
                    nowPlayingText.innerText = "Натисніть кнопку Play для відтворення";
                    console.log("Автозапуск заблоковано політикою iOS браузера.");
                });
        } 
        else if (Hls.isSupported()) {
            if (hlsPlayer) hlsPlayer.destroy();
            hlsPlayer = new Hls();
            hlsPlayer.loadSource(m3u8Url);
            hlsPlayer.attachMedia(player);
            hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                player.play();
                nowPlayingText.innerText = "Зараз відтворюється: " + title;
            });
            hlsPlayer.on(Hls.Events.ERROR, (event, data) => {
                if(data.fatal) {
                    nowPlayingText.innerText = "❌ Помилка завантаження відео (можливо файл видалено з серверов Twitch)";
                }
            });
        } else {
            alert('Ваш пристрій не підтримує HLS відео.');
        }
    }
</script>
</body>
</html>
