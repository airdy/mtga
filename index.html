<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch VOD Recovery & Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #1f1f23;
            --accent-color: #9146ff;
            --accent-hover: #772ce8;
            --text-main: #efeff1;
            --text-muted: #adadb8;
            --border-color: #303032;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        /* Панелі керування */
        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: #000;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--accent-hover);
        }

        /* Секція плеєра */
        .player-section {
            display: none;
            margin-bottom: 30px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .player-title {
            padding: 15px;
            background: var(--card-bg);
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border-color);
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            display: block;
        }

        /* Сітка результатів пошуку */
        .vods-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .vod-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .vod-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-color);
        }

        .thumbnail-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }

        .thumbnail-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.8);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .vod-info {
            padding: 15px;
        }

        .vod-card-title {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.6rem;
        }

        .vod-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-message {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Twitch VOD Downloader & Player</h1>
    </header>

    <div class="panel">
        <div class="panel-title">Пряме відновлення</div>
        <div class="input-group">
            <input type="text" id="directUrlInput" placeholder="Вставте пряме посилання .m3u8 або системний хеш папки (напр., 5c6c79e9..._1782936187)">
            <button onclick="handleDirectRecovery()">Відновити</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Пошук відкритих ВОДів</div>
        <div class="input-group">
            <input type="text" id="usernameInput" placeholder="Введіть нікнейм стрімера..." onkeydown="if(event.key === 'Enter') searchVods()">
            <button onclick="searchVods()">Знайти</button>
        </div>
    </div>

    <div class="player-section" id="playerSection">
        <div class="player-title" id="currentPlayerTitle">Назва трансляції</div>
        <video id="videoPlayer" controls></video>
    </div>

    <div id="statusMessage" class="status-message">Введіть нікнейм або скористайтеся панеллю прямого відновлення.</div>
    <div class="vods-grid" id="vodsGrid"></div>
</div>

<script>
    let hlsInstance = null;

    // 1. Пошук відео через API
    async function searchVods() {
        const username = document.getElementById('usernameInput').value.trim();
        const grid = document.getElementById('vodsGrid');
        const status = document.getElementById('statusMessage');

        if (!username) return alert('Введіть нікнейм!');

        grid.innerHTML = '';
        status.style.display = 'block';
        status.innerText = 'Шукаємо відкриті відео...';

        try {
            const response = await fetch(`/api/get-vods?username=${encodeURIComponent(username)}`);
            const data = await response.json();

            if (data.error) {
                status.innerText = `Помилка: ${data.error}`;
                return;
            }

            if (!data.vods || data.vods.length === 0) {
                status.innerText = 'В офіційному профілі немає відкритих відео. Скористайтеся верхньою панеллю "Прямого відновлення".';
                return;
            }

            status.style.display = 'none';

            data.vods.forEach(vod => {
                const card = document.createElement('div');
                card.className = 'vod-card';
                
                // Безпечно екрануємо назву для передачі у функцію кліку
                const safeTitle = vod.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                card.setAttribute('onclick', `launchVideo('${vod.m3u8}', '${safeTitle}')`);

                const date = new Date(vod.created_at).toLocaleDateString('uk-UA', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });

                card.innerHTML = `
                    <div class="thumbnail-wrapper">
                        <img src="${vod.thumbnail}" alt="Обкладинка">
                        <div class="duration">${vod.duration}</div>
                    </div>
                    <div class="vod-info">
                        <div class="vod-card-title">${vod.title}</div>
                        <div class="vod-meta">${date}</div>
                    </div>
                `;
                grid.appendChild(card);
            });

        } catch (err) {
            status.innerText = `Не вдалося виконати запит: ${err.message}`;
        }
    }

    // 2. Пряме відновлення з верхнього інпуту
    function handleDirectRecovery() {
        let rawInput = document.getElementById('directUrlInput').value.trim();
        if (!rawInput) return alert('Введіть посилання або системний хеш!');

        let finalUrl = "";

        // Якщо вставили повний лінк
        if (rawInput.startsWith('http') && rawInput.includes('.m3u8')) {
            finalUrl = `/api/proxy?url=${encodeURIComponent(rawInput)}`;
        } 
        // Якщо вставили лише внутрішній хеш папки потоку (наприклад: 5c6c79e9be170a577ad2_lizok_ssk_317853129958_1782936187)
        else if (rawInput.includes('_') && !rawInput.startsWith('http')) {
            const guessedCdn = `https://d3fi1amfgojobc.cloudfront.net/${rawInput}/chunked/index-dvr.m3u8`;
            finalUrl = `/api/proxy?url=${encodeURIComponent(guessedCdn)}`;
        } 
        else {
            alert('Невідомий формат! Вставте або пряме посилання .m3u8, або повну назву папки з архівом (з нижніми підкресленнями).');
            return;
        }

        launchVideo(finalUrl, "Пряме відновлення трансляції");
    }

    // 3. Ініціалізація плеєра та запуск потоку
    function launchVideo(proxyUrl, title) {
        const playerSection = document.getElementById('playerSection');
        const video = document.getElementById('videoPlayer');
        document.getElementById('currentPlayerTitle').innerText = title;

        // Показуємо плеєр та плавно скролимо до нього
        playerSection.style.display = 'block';
        playerSection.scrollIntoView({ behavior: 'smooth' });

        // Руйнуємо старий потік, якщо він відтворювався
        if (hlsInstance) {
            hlsInstance.destroy();
        }

        // Перевіряємо підтримку HLS.js (для Chrome/Opera/Firefox)
        if (Hls.isSupported()) {
            hlsInstance = new Hls({
                maxMaxBufferLength: 30 // Оптимальний буфер для стабільності
            });
            hlsInstance.loadSource(proxyUrl);
            hlsInstance.attachMedia(video);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(err => console.log("Автоплей заблоковано браузером, чекаємо на клік"));
            });

            hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    console.error("Помилка HLS:", data);
                    if (data.details === 'manifestLoadError') {
                        alert("Не вдалося завантажити відео-маніфест. Швидше за все, Twitch вже фізично видалив цей запис зі своїх серверів.");
                    }
                }
            });
        } 
        // Для браузерів із рідною підтримкою HLS (наприклад, Safari на macOS/iOS)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = proxyUrl;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    }
</script>

</body>
</html>
