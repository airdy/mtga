<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch VOD Recovery & Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #0e0e10;
            --card-bg: #1f1f23;
            --accent-color: #9146ff;
            --accent-hover: #772ce8;
            --text-main: #efeff1;
            --text-muted: #adadb8;
            --border-color: #303032;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 30px; text-align: center; }
        h1 { color: var(--accent-color); margin-bottom: 10px; }

        .panel { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .panel-title { font-size: 1.1rem; margin-bottom: 15px; color: var(--text-muted); font-weight: bold; }
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; background: #000; border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 6px; font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: var(--accent-color); }
        button { background: var(--accent-color); color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        button:hover { background: var(--accent-hover); }

        .player-section { display: none; margin-bottom: 30px; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); }
        .player-title { padding: 15px; background: var(--card-bg); font-size: 1.2rem; border-bottom: 1px solid var(--border-color); }
        video { width: 100%; aspect-ratio: 16/9; display: block; }

        .vods-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .vod-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .vod-card:hover { transform: translateY(-4px); border-color: var(--accent-color); }
        .thumbnail-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        .thumbnail-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0, 0, 0, 0.8); padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; }
        .vod-info { padding: 15px; }
        .vod-card-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.6rem; }
        .vod-meta { font-size: 0.85rem; color: var(--text-muted); }
        .status-message { text-align: center; padding: 40px; color: var(--text-muted); font-size: 1.1rem; }
        .monitored-list { margin-top: 12px; font-size: 0.9rem; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Twitch VOD Recovery</h1>
    </header>

    <div class="panel">
        <div class="panel-title">Пряме відновлення</div>
        <div class="input-group">
            <input type="text" id="directUrlInput" placeholder="Вставте пряме посилання або хеш папки (напр. 3a82..._1234)">
            <button onclick="handleDirectRecovery()">Відновити</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Пошук відкритих та перехоплених ВОДів</div>
        <div class="input-group">
            <input type="text" id="usernameInput" placeholder="Введіть нікнейм стрімера..." onkeydown="if(event.key === 'Enter') searchVods()">
            <button onclick="searchVods()">Знайти</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">Фоновий моніторинг (Вебхуки Upstash)</div>
        <div class="input-group">
            <input type="text" id="monitorInput" placeholder="Нікнейм стрімера для контролю..." onkeydown="if(event.key === 'Enter') subscribeToMonitor()">
            <button style="background: #23a55a;" onclick="subscribeToMonitor()">Увімкнути моніторинг</button>
        </div>
        <div class="monitored-list" id="monitoredListText">Завантаження списку активних підписок...</div>
    </div>

    <div class="player-section" id="playerSection">
        <div class="player-title" id="currentPlayerTitle">Назва трансляції</div>
        <video id="videoPlayer" controls></video>
    </div>

    <div id="statusMessage" class="status-message">Введіть нікнейм або скористайтеся інструментами вище.</div>
    <div class="vods-grid" id="vodsGrid"></div>
</div>

<script>
    let hlsInstance = null;

    document.addEventListener("DOMContentLoaded", updateMonitoredListDisplay);

    async function updateMonitoredListDisplay() {
        try {
            const res = await fetch('/api/subscribe');
            const data = await res.json();
            if (data.channels && data.channels.length > 0) {
                document.getElementById('monitoredListText').innerText = `Зараз під моніторингом: ${data.channels.join(', ')}`;
            } else {
                document.getElementById('monitoredListText').innerText = "Наразі немає активних фонових підписок.";
            }
        } catch(e) {
            document.getElementById('monitoredListText').innerText = "Не вдалося завантажити список підписок.";
        }
    }

    async function subscribeToMonitor() {
        const username = document.getElementById('monitorInput').value.trim();
        if (!username) return alert('Введіть нікнейм для підписки!');

        document.getElementById('monitoredListText').innerText = "Реєстрація...";

        try {
            const response = await fetch('/api/subscribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            const data = await response.json();

            if (data.success) {
                alert(data.message);
                document.getElementById('monitorInput').value = '';
            } else {
                alert(`Помилка: ${data.error}`);
            }
            updateMonitoredListDisplay();
        } catch (err) {
            alert(`Помилка з'єднання: ${err.message}`);
            updateMonitoredListDisplay();
        }
    }

    async function searchVods() {
        const username = document.getElementById('usernameInput').value.trim();
        const grid = document.getElementById('vodsGrid');
        const status = document.getElementById('statusMessage');

        if (!username) return alert('Введіть нікнейм!');

        grid.innerHTML = '';
        status.style.display = 'block';
        status.innerText = 'Аналізуємо сервери...';

        try {
            const response = await fetch(`/api/get-vods?username=${encodeURIComponent(username)}`);
            const data = await response.json();

            if (data.error) {
                status.innerText = `Помилка: ${data.error}`;
                return;
            }

            if (!data.vods || data.vods.length === 0) {
                status.innerText = 'Жодних відео не знайдено ні в профілі, ні в базі перехоплень.';
                return;
            }

            status.style.display = 'none';

            data.vods.forEach(vod => {
                const card = document.createElement('div');
                card.className = 'vod-card';
                
                const safeTitle = btoa(unescape(encodeURIComponent(vod.title)));
                card.setAttribute('onclick', `launchVideo('${vod.m3u8}', '${safeTitle}')`);

                const date = new Date(vod.created_at).toLocaleDateString('uk-UA', {
                    day: 'numeric', month: 'long', year: 'numeric'
                });

                card.innerHTML = `
                    <div class="thumbnail-wrapper">
                        <img src="${vod.thumbnail}" alt="Обкладинка">
                        <div class="duration">${vod.duration}</div>
                    </div>
                    <div class="vod-info">
                        <div class="vod-card-title">${vod.title}</div>
                        <div class="vod-meta">${date}</div>
                    </div>
                `;
                grid.appendChild(card);
            });

        } catch (err) {
            status.innerText = `Не вдалося виконати запит: ${err.message}`;
        }
    }

    function handleDirectRecovery() {
        let rawInput = document.getElementById('directUrlInput').value.trim();
        if (!rawInput) return alert('Введіть посилання або системний хеш!');

        let finalUrl = "";

        if (rawInput.startsWith('http') && rawInput.includes('.m3u8')) {
            if (rawInput.includes('vod-secure.twitch.tv')) {
                finalUrl = rawInput.replace('vod-secure.twitch.tv', 'd2v02itv0y9u9t.cloudfront.net');
            } else {
                finalUrl = rawInput;
            }
        } 
        else if (rawInput.includes('_') && !rawInput.startsWith('http')) {
            finalUrl = `https://d2v02itv0y9u9t.cloudfront.net/${rawInput}/chunked/index-dvr.m3u8`;
        } 
        else {
            alert('Вставте пряме посилання .m3u8, або назву папки з архівом.');
            return;
        }

        const safeTitle = btoa(unescape(encodeURIComponent("Пряме відновлення трансляції")));
        launchVideo(finalUrl, safeTitle);
    }

    function launchVideo(proxiedM3u8Url, base64Title) {
        const decodedTitle = decodeURIComponent(escape(atob(base64Title)));
        const playerSection = document.getElementById('playerSection');
        const video = document.getElementById('videoPlayer');
        document.getElementById('currentPlayerTitle').innerText = decodedTitle;

        playerSection.style.display = 'block';
        playerSection.scrollIntoView({ behavior: 'smooth' });

        // Якщо HLS вже був запущений — знищуємо його перед новим стартом
        if (hlsInstance) {
            hlsInstance.destroy();
        }

        // Hls.js тепер працює з потоком, який віддає наш proxy.js
        if (Hls.isSupported()) {
            hlsInstance = new Hls({
                // Додаємо конфігурацію для того, щоб HLS проксіював запити фрагментів
                xhrSetup: function(xhr, url) {
                    // Якщо шлях відносний, додаємо наш API префікс
                    if (url.startsWith('/')) return;
                }
            });
            
            hlsInstance.loadSource(proxiedM3u8Url);
            hlsInstance.attachMedia(video);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(e => console.log("Автоплей заблоковано браузером"));
            });

            hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    console.error("Критична помилка HLS:", data);
                    alert("Помилка відтворення. Можливо, потік потребує авторизації або файл видалено.");
                }
            });
        } 
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = proxiedM3u8Url;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    }
	var hlsInstance = new Hls({
   	 // Ця функція змушує плеєр завантажувати всі файли через ваш проксі
   	 xhrSetup: function(xhr, url) {
       		 if (url.includes('vod-secure.twitch.tv')) {
           	 // Перетворюємо пряме посилання на фрагмент у посилання на проксі
           	 const proxiedUrl = `/api/proxy?url=${encodeURIComponent(url)}`;
            	xhr.open('GET', proxiedUrl, true);
        	}
    	}
	});
</script>

</body>
</html>
